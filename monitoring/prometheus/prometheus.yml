global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "switchapp-api"
    metrics_path: /api/v1/metrics
    # NOTE: /api/v1/metrics is accessible without auth for internal scraping.
    # It should not be exposed publicly; restrict via network policies in production.
    static_configs:
      # IMPORTANT: port must match API_PORT in .env (default 4001)
      - targets: ["api:4001"]
        labels:
          service: "api"

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
