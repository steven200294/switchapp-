global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "switchapp-api"
    metrics_path: /api/v1/metrics
    static_configs:
      # Uses the internal Docker network — must match API_PORT in .env
      - targets: ["api:4001"]
        labels:
          service: "api"

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
